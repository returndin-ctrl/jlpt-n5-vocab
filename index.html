<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#4F46E5">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="N5單字">
<link rel="manifest" href="manifest.json">
<title>JLPT N5 單字王</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --pri:#6366F1;--pri2:#4F46E5;--pri3:#3730A3;
  --acc:#8B5CF6;--grn:#10B981;--red:#EF4444;--org:#F59E0B;--blu:#3B82F6;
  --bg:#F5F3FF;--card:#FFFFFF;--txt:#111827;--sub:#6B7280;--bdr:#EDE9FE;
  --shadow-sm:0 2px 8px rgba(99,102,241,.10);
  --shadow:0 4px 20px rgba(99,102,241,.15);
  --shadow-lg:0 8px 32px rgba(99,102,241,.20);
}
html,body{height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',Arial,sans-serif}
body{background:var(--bg);color:var(--txt);user-select:none;-webkit-user-select:none}
#app{max-width:480px;margin:0 auto;height:100vh;display:flex;flex-direction:column;overflow:hidden;position:relative}

/* CONTENT */
.content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.screen{display:none;padding:18px;min-height:100%}
.screen.active{display:block}

/* BOTTOM NAV */
.bnav{display:flex;background:#fff;border-top:none;flex-shrink:0;
  box-shadow:0 -4px 20px rgba(99,102,241,.10);border-radius:24px 24px 0 0;
  padding:6px 8px;padding-bottom:max(10px,env(safe-area-inset-bottom))}
.bnav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;
  padding:8px 4px;border:none;background:none;color:var(--sub);font-size:10px;
  font-weight:500;cursor:pointer;transition:all .2s;border-radius:14px}
.bnav-btn.active{color:var(--pri)}
.bnav-btn.active svg{filter:drop-shadow(0 2px 4px rgba(99,102,241,.4))}
.bnav-icon{width:40px;height:28px;display:flex;align-items:center;justify-content:center;
  border-radius:10px;transition:all .2s}
.bnav-btn.active .bnav-icon{background:var(--bdr)}
.bnav-btn svg{width:20px;height:20px}

/* CARDS */
.card{background:var(--card);border-radius:18px;padding:18px;margin-bottom:14px;
  box-shadow:var(--shadow-sm)}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
.stat-card{background:var(--card);border-radius:18px;padding:16px 14px;
  box-shadow:var(--shadow-sm);position:relative;overflow:hidden}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:18px 18px 0 0}
.stat-card.c-blue::before{background:var(--blu)}
.stat-card.c-purple::before{background:var(--acc)}
.stat-card.c-green::before{background:var(--grn)}
.stat-card.c-orange::before{background:var(--org)}
.stat-icon{font-size:22px;margin-bottom:8px}
.stat-num{font-size:30px;font-weight:800;color:var(--txt);line-height:1}
.stat-lbl{font-size:12px;color:var(--sub);margin-top:4px;font-weight:500}

/* BUTTONS */
.btn{display:block;width:100%;padding:16px;border:none;border-radius:16px;font-size:16px;
  font-weight:600;cursor:pointer;transition:transform .15s,box-shadow .15s;margin-bottom:10px}
.btn:active{transform:scale(.97)}
.btn-pri{background:linear-gradient(135deg,var(--pri),var(--acc));color:#fff;box-shadow:0 4px 16px rgba(99,102,241,.35)}
.btn-pri:active{box-shadow:0 2px 8px rgba(99,102,241,.25)}
.btn-sec{background:#fff;color:var(--pri);border:2px solid var(--bdr);box-shadow:var(--shadow-sm)}
.btn-grn{background:linear-gradient(135deg,#10B981,#059669);color:#fff;box-shadow:0 4px 16px rgba(16,185,129,.3)}
.btn-sml{display:inline-flex;align-items:center;justify-content:center;gap:6px;
  padding:9px 16px;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer}

/* HERO / STREAK */
.streak-bar{background:linear-gradient(135deg,#6366F1 0%,#8B5CF6 50%,#A78BFA 100%);
  border-radius:22px;padding:20px;margin-bottom:16px;color:#fff;
  display:flex;align-items:center;justify-content:space-between;
  box-shadow:0 6px 24px rgba(99,102,241,.35);position:relative;overflow:hidden}
.streak-bar::after{content:'';position:absolute;top:-30px;right:-20px;
  width:120px;height:120px;background:rgba(255,255,255,.08);border-radius:50%}
.streak-left h2{font-size:24px;font-weight:800}
.streak-left p{font-size:13px;opacity:.85;margin-top:3px}
.streak-fire{font-size:54px;line-height:1;position:relative;z-index:1}

/* PROGRESS BAR */
.prog-wrap{background:#EDE9FE;border-radius:99px;height:10px;overflow:hidden;margin:10px 0}
.prog-bar{height:100%;background:linear-gradient(90deg,var(--pri),var(--acc));
  border-radius:99px;transition:width .6s cubic-bezier(.4,0,.2,1)}
.prog-txt{display:flex;justify-content:space-between;font-size:12px;color:var(--sub);font-weight:500}

/* FLASHCARD */
.fc-wrap{display:flex;flex-direction:column;height:100%;padding:0;background:var(--bg)}
.fc-hdr{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;
  padding-top:max(14px,env(safe-area-inset-top));
  background:linear-gradient(135deg,var(--pri),var(--acc));color:#fff;flex-shrink:0}
.fc-hdr h2{font-size:16px;font-weight:700}
.fc-close{background:rgba(255,255,255,.2);border:none;color:#fff;border-radius:50%;
  width:34px;height:34px;font-size:18px;cursor:pointer;line-height:34px;text-align:center;
  backdrop-filter:blur(4px)}
.fc-prog{height:3px;background:rgba(255,255,255,.25)}
.fc-prog-fill{height:100%;background:#fff;transition:width .3s;border-radius:99px}
.fc-body{flex:1;display:flex;align-items:center;justify-content:center;padding:24px 20px}

.flip-card{width:100%;max-width:380px;height:300px;perspective:1200px;cursor:pointer}
.flip-inner{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform .55s cubic-bezier(.4,0,.2,1)}
.flip-inner.flipped{transform:rotateY(180deg)}
.flip-front,.flip-back{position:absolute;width:100%;height:100%;backface-visibility:hidden;
  -webkit-backface-visibility:hidden;border-radius:24px;display:flex;flex-direction:column;
  align-items:center;justify-content:center;padding:28px;box-shadow:var(--shadow-lg)}
.flip-front{background:linear-gradient(145deg,#6366F1,#8B5CF6,#A78BFA);color:#fff}
.flip-back{background:#fff;transform:rotateY(180deg);border:1px solid var(--bdr)}
.fc-kanji{font-size:56px;font-weight:700;margin-bottom:10px;text-align:center;letter-spacing:2px}
.fc-reading{font-size:22px;opacity:.9;text-align:center;font-weight:500}
.fc-hint{font-size:12px;opacity:.55;margin-top:18px;letter-spacing:.5px}
.fc-pos-badge{background:rgba(255,255,255,.22);border-radius:99px;padding:5px 14px;
  font-size:12px;margin-bottom:14px;font-weight:600;backdrop-filter:blur(4px)}
.back-kanji{font-size:30px;font-weight:700;color:var(--pri);margin-bottom:4px}
.back-reading{font-size:16px;color:var(--sub);margin-bottom:14px}
.back-meaning{font-size:28px;font-weight:800;color:var(--txt);text-align:center;margin-bottom:12px}
.back-pos{font-size:12px;color:var(--sub);background:var(--bg);border-radius:99px;
  padding:4px 12px;margin-bottom:12px;font-weight:500}
.back-ex{font-size:13px;color:var(--sub);text-align:center;line-height:1.7;
  border-top:1.5px solid var(--bdr);padding-top:12px;width:100%}

.fc-btns{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px;padding:14px 16px;
  padding-bottom:max(14px,env(safe-area-inset-bottom));background:#fff;
  border-top:1px solid var(--bdr);flex-shrink:0}
.rate-btn{padding:12px 4px;border:none;border-radius:14px;font-size:12px;font-weight:700;
  cursor:pointer;transition:transform .15s;display:flex;flex-direction:column;align-items:center;gap:3px}
.rate-btn:active{transform:scale(.93)}
.rate-btn .icon{font-size:20px}
.rate-btn.r0{background:#FEE2E2;color:#DC2626}
.rate-btn.r1{background:#FEF3C7;color:#D97706}
.rate-btn.r2{background:#D1FAE5;color:#059669}
.rate-btn.r3{background:#EFF6FF;color:#2563EB}
.fc-done{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:30px;text-align:center;background:var(--bg)}
.fc-done h2{font-size:28px;font-weight:800;margin:16px 0 8px}
.fc-done p{color:var(--sub);margin-bottom:24px}

/* QUIZ */
.qz-wrap{display:flex;flex-direction:column;height:100%;background:var(--bg)}
.qz-hdr{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;
  padding-top:max(14px,env(safe-area-inset-top));
  background:linear-gradient(135deg,var(--pri),var(--acc));color:#fff;flex-shrink:0}
.qz-prog{height:3px;background:rgba(255,255,255,.25)}
.qz-prog-fill{height:100%;background:#fff;transition:width .3s;border-radius:99px}
.qz-body{flex:1;padding:20px;overflow-y:auto;-webkit-overflow-scrolling:touch}
.qz-question{background:linear-gradient(145deg,#6366F1,#8B5CF6);border-radius:22px;
  padding:28px 22px;text-align:center;margin-bottom:20px;color:#fff;
  box-shadow:0 6px 24px rgba(99,102,241,.30);position:relative;overflow:hidden}
.qz-question::before{content:'';position:absolute;bottom:-20px;right:-20px;
  width:100px;height:100px;background:rgba(255,255,255,.07);border-radius:50%}
.qz-q-word{display:none}
.qz-q-reading{font-size:46px;font-weight:800;margin-top:4px;letter-spacing:3px;text-shadow:0 2px 10px rgba(0,0,0,.15)}
.qz-q-lbl{font-size:12px;opacity:.7;margin-bottom:8px;letter-spacing:.5px;text-transform:uppercase}
.qz-q-pos{font-size:12px;background:rgba(255,255,255,.2);border-radius:99px;
  padding:4px 12px;display:inline-block;margin-top:12px;font-weight:600;
  backdrop-filter:blur(4px)}
.choice-btn{display:flex;align-items:center;gap:14px;width:100%;padding:15px 16px;
  border:1.5px solid var(--bdr);border-radius:16px;background:#fff;font-size:15px;
  font-weight:500;cursor:pointer;margin-bottom:10px;text-align:left;
  transition:all .18s;color:var(--txt);box-shadow:var(--shadow-sm)}
.choice-btn:active{transform:scale(.98);background:var(--bg)}
.choice-label{width:30px;height:30px;border-radius:10px;
  background:linear-gradient(135deg,var(--pri),var(--acc));
  color:#fff;font-size:13px;font-weight:700;display:flex;align-items:center;
  justify-content:center;flex-shrink:0}
.choice-btn.correct{border-color:var(--grn);background:#ECFDF5;color:#065F46;box-shadow:0 4px 12px rgba(16,185,129,.2)}
.choice-btn.correct .choice-label{background:var(--grn)}
.choice-btn.wrong{border-color:var(--red);background:#FEF2F2;color:#991B1B;box-shadow:0 4px 12px rgba(239,68,68,.15)}
.choice-btn.wrong .choice-label{background:var(--red)}
.choice-btn.disabled{cursor:default;pointer-events:none}
.qz-score{text-align:center;padding:30px 20px}
.qz-score h2{font-size:28px;font-weight:800;margin:16px 0 8px}
.score-circle{width:130px;height:130px;border-radius:50%;
  background:linear-gradient(135deg,var(--pri),var(--acc));
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  margin:0 auto 20px;box-shadow:0 6px 24px rgba(99,102,241,.3)}
.score-num{font-size:34px;font-weight:800;color:#fff}
.score-tot{font-size:13px;color:rgba(255,255,255,.8)}

/* WORD LIST */
.search-bar{position:relative;margin-bottom:14px}
.search-bar input{width:100%;padding:13px 16px 13px 44px;border:1.5px solid var(--bdr);
  border-radius:14px;font-size:15px;background:#fff;outline:none;color:var(--txt);
  box-shadow:var(--shadow-sm)}
.search-bar input:focus{border-color:var(--pri);box-shadow:0 0 0 3px rgba(99,102,241,.1)}
.search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--sub);font-size:16px}
.filter-tabs{display:flex;gap:7px;margin-bottom:14px;overflow-x:auto;padding-bottom:4px}
.filter-tabs::-webkit-scrollbar{display:none}
.filter-tab{flex-shrink:0;padding:8px 16px;border-radius:99px;border:1.5px solid var(--bdr);
  background:#fff;font-size:13px;font-weight:600;cursor:pointer;color:var(--sub);
  box-shadow:var(--shadow-sm)}
.filter-tab.active{background:linear-gradient(135deg,var(--pri),var(--acc));color:#fff;border-color:transparent;box-shadow:0 4px 12px rgba(99,102,241,.3)}
.word-item{background:#fff;border-radius:16px;padding:14px 16px;margin-bottom:8px;
  box-shadow:var(--shadow-sm);display:flex;align-items:center;gap:12px;cursor:pointer;
  border:1px solid transparent;transition:border-color .2s}
.word-item:active{opacity:.85;border-color:var(--bdr)}
.word-status-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.dot-new{background:#D1D5DB}
.dot-learning{background:var(--org)}
.dot-learned{background:var(--grn)}
.word-main{flex:1;min-width:0}
.word-kanji{font-size:18px;font-weight:700;color:var(--txt)}
.word-reading{font-size:13px;color:var(--sub);margin-top:2px}
.word-meaning{font-size:14px;color:var(--txt);font-weight:500;margin-top:2px}
.word-pos{font-size:11px;color:var(--pri);background:var(--bdr);border-radius:99px;
  padding:3px 10px;flex-shrink:0;font-weight:600}

/* WORD DETAIL MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(17,24,39,.5);z-index:100;
  display:none;align-items:flex-end;backdrop-filter:blur(2px)}
.modal-overlay.open{display:flex}
.modal{background:#fff;border-radius:28px 28px 0 0;width:100%;max-width:480px;margin:0 auto;
  padding:20px;padding-bottom:max(24px,env(safe-area-inset-bottom));max-height:85vh;overflow-y:auto}
.modal-handle{width:40px;height:4px;background:var(--bdr);border-radius:99px;margin:0 auto 18px}
.modal-kanji{font-size:52px;font-weight:800;text-align:center;
  background:linear-gradient(135deg,var(--pri),var(--acc));-webkit-background-clip:text;
  -webkit-text-fill-color:transparent;background-clip:text}
.modal-reading{font-size:20px;text-align:center;color:var(--sub);margin-bottom:8px}
.modal-meaning{font-size:24px;font-weight:800;text-align:center;margin-bottom:8px;color:var(--txt)}
.modal-pos{text-align:center;margin-bottom:16px}
.modal-ex{background:var(--bg);border-radius:14px;padding:16px;margin-bottom:16px;
  border-left:3px solid var(--pri)}
.modal-ex p{font-size:14px;line-height:1.75;color:var(--txt)}
.modal-ex .ex-lbl{font-size:12px;color:var(--pri);margin-bottom:8px;font-weight:700;letter-spacing:.5px}
.modal-progress{display:flex;gap:10px;margin-bottom:12px}
.modal-progress .mp{flex:1;background:var(--bg);border-radius:12px;padding:12px;text-align:center}
.modal-progress .mp-num{font-size:20px;font-weight:800;color:var(--pri)}
.modal-progress .mp-lbl{font-size:11px;color:var(--sub);font-weight:500}

/* STATS */
.stats-hero{background:linear-gradient(145deg,#6366F1,#8B5CF6,#A78BFA);border-radius:22px;
  padding:24px 20px;margin-bottom:16px;color:#fff;text-align:center;
  box-shadow:0 6px 24px rgba(99,102,241,.3)}
.stats-hero h2{font-size:42px;font-weight:800;text-shadow:0 2px 8px rgba(0,0,0,.15)}
.stats-hero p{opacity:.85;margin-top:6px;font-size:15px;font-weight:500}
.status-legend{display:flex;flex-direction:column;gap:8px;margin-bottom:16px}
.legend-row{display:flex;align-items:center;justify-content:space-between;
  background:#fff;border-radius:14px;padding:14px 16px;box-shadow:var(--shadow-sm)}
.legend-left{display:flex;align-items:center;gap:12px;font-weight:500}
.legend-dot{width:12px;height:12px;border-radius:4px}

/* SPEAK BUTTONS */
.speak-fab{background:rgba(255,255,255,.22);border:none;color:#fff;border-radius:99px;
  padding:8px 20px;font-size:13px;font-weight:600;cursor:pointer;margin-top:12px;
  display:inline-flex;align-items:center;gap:7px;backdrop-filter:blur(4px);
  transition:background .2s;letter-spacing:.3px}
.speak-fab:active{background:rgba(255,255,255,.4);transform:scale(.96)}
.speak-fab svg{width:16px;height:16px}
.speak-fab.playing{background:rgba(255,255,255,.38)}
.speak-ex-btn{background:var(--bg);border:1.5px solid var(--bdr);color:var(--pri);
  border-radius:99px;padding:7px 16px;font-size:13px;font-weight:600;cursor:pointer;
  margin-top:10px;display:inline-flex;align-items:center;gap:6px;transition:all .2s}
.speak-ex-btn:active{background:var(--bdr);transform:scale(.97)}
.speak-ex-btn.hidden{display:none}
.speak-modal-row{display:flex;gap:10px;justify-content:center;margin:10px 0 16px}
.speak-modal-btn{background:var(--bg);border:1.5px solid var(--bdr);color:var(--pri);
  border-radius:99px;padding:9px 20px;font-size:14px;font-weight:600;cursor:pointer;
  display:inline-flex;align-items:center;gap:7px;transition:all .2s}
.speak-modal-btn:active{background:var(--bdr);transform:scale(.97)}
.speak-modal-btn svg{width:16px;height:16px}

/* TOAST */
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(20px);
  background:#111827;color:#fff;padding:11px 20px;border-radius:99px;font-size:14px;
  font-weight:500;opacity:0;transition:all .3s;pointer-events:none;z-index:200;
  white-space:nowrap;box-shadow:0 4px 16px rgba(0,0,0,.25)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div id="app">

<!-- ===== HOME ===== -->
<div id="s-home" class="screen active" style="padding-bottom:80px">
  <div class="streak-bar">
    <div class="streak-left">
      <h2 id="streak-num">🔥 0天</h2>
      <p id="today-date"></p>
    </div>
    <div class="streak-fire">日</div>
  </div>
  <div class="stat-grid">
    <div class="stat-card c-blue">
      <div class="stat-icon">📚</div>
      <div class="stat-num" id="stat-due">0</div>
      <div class="stat-lbl">待複習</div>
    </div>
    <div class="stat-card c-purple">
      <div class="stat-icon">✨</div>
      <div class="stat-num" id="stat-new">0</div>
      <div class="stat-lbl">新單字</div>
    </div>
    <div class="stat-card c-green">
      <div class="stat-icon">🏆</div>
      <div class="stat-num" id="stat-learned">0</div>
      <div class="stat-lbl">已掌握</div>
    </div>
    <div class="stat-card c-orange">
      <div class="stat-icon">🎯</div>
      <div class="stat-num" id="stat-acc">—</div>
      <div class="stat-lbl">正確率</div>
    </div>
  </div>
  <div class="card">
    <div class="prog-txt"><span style="font-weight:600;color:var(--txt)">總進度</span><span id="prog-pct" style="font-weight:700;color:var(--pri)">0%</span></div>
    <div class="prog-wrap"><div class="prog-bar" id="prog-bar" style="width:0%"></div></div>
    <div class="prog-txt" style="margin-top:6px"><span>已學習</span><span id="total-words">共 0 字</span></div>
  </div>
  <button class="btn btn-pri" onclick="startFlashcard('due')">📚 開始複習</button>
  <button class="btn btn-sec" onclick="startFlashcard('new')">✨ 學新單字</button>
  <button class="btn btn-grn" onclick="startQuiz()">🎯 選擇題測驗</button>
</div>

<!-- ===== FLASHCARD ===== -->
<div id="s-flashcard" class="screen" style="padding:0;display:none;flex-direction:column;height:100%">
  <div class="fc-hdr">
    <button class="fc-close" onclick="exitStudy()">✕</button>
    <h2 id="fc-title">閃卡複習</h2>
    <span id="fc-counter" style="font-size:14px">0/0</span>
  </div>
  <div class="fc-prog"><div class="fc-prog-fill" id="fc-prog" style="width:0%"></div></div>
  <div id="fc-session-body" style="flex:1;display:flex;flex-direction:column">
    <div class="fc-body">
      <div class="flip-card" id="flip-card" onclick="flipCard()">
        <div class="flip-inner" id="flip-inner">
          <div class="flip-front">
            <div class="fc-pos-badge" id="fc-pos-front">名詞</div>
            <div class="fc-kanji" id="fc-kanji">学校</div>
            <div class="fc-reading" id="fc-reading">がっこう</div>
            <button class="speak-fab" id="fc-speak-btn" onclick="event.stopPropagation();speakFC()">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
              聽發音
            </button>
            <div class="fc-hint" style="margin-top:10px">👆 點擊翻轉</div>

// ===================== SRS & PROGRESS =====================
const PROG_KEY = 'n5_prog_v2';
const META_KEY = 'n5_meta_v2';

function loadProg() { return JSON.parse(localStorage.getItem(PROG_KEY) || '{}'); }
function saveProg(p) { localStorage.setItem(PROG_KEY, JSON.stringify(p)); }
function loadMeta() { return JSON.parse(localStorage.getItem(META_KEY) || '{"streak":0,"lastDate":"","totalReviews":0,"totalCorrect":0}'); }
function saveMeta(m) { localStorage.setItem(META_KEY, JSON.stringify(m)); }

function getWordProg(id) {
  const p = loadProg();
  return p[id] || { status:'new', interval:0, reps:0, ef:2.5, next:null, reviews:0, correct:0 };
}

function updateWordProg(id, q) { // q: 0=wrong,1=hard,2=ok,3=easy
  const prog = loadProg();
  const wp = prog[id] || { status:'new', interval:0, reps:0, ef:2.5, next:null, reviews:0, correct:0 };
  wp.reviews++;
  if (q >= 2) wp.correct++;
  if (q === 0) {
    wp.interval = 1; wp.reps = 0; wp.status = 'learning';
  } else if (q === 1) {
    wp.interval = Math.max(1, wp.interval < 2 ? 1 : Math.floor(wp.interval * 1.2));
    wp.reps = Math.max(0, wp.reps - 1); wp.status = 'learning';
  } else {
    if (wp.reps === 0) wp.interval = 1;
    else if (wp.reps === 1) wp.interval = 6;
    else wp.interval = Math.round(wp.interval * wp.ef);
    if (q === 3) { wp.interval = Math.round(wp.interval * 1.3); wp.ef = Math.min(3.0, wp.ef + 0.15); }
    else { wp.ef = Math.max(1.3, wp.ef + 0.1 - (3-q)*(0.08+(3-q)*0.02)); }
    wp.reps++;
    wp.status = wp.interval >= 21 ? 'learned' : 'learning';
  }
  const d = new Date(); d.setDate(d.getDate() + wp.interval);
  wp.next = d.toISOString().split('T')[0];
  prog[id] = wp;
  saveProg(prog);

  const meta = loadMeta();
  meta.totalReviews++;
  if (q >= 2) meta.totalCorrect++;
  const today = new Date().toISOString().split('T')[0];
  if (meta.lastDate !== today) {
    const yesterday = new Date(); yesterday.setDate(yesterday.getDate()-1);
    const yStr = yesterday.toISOString().split('T')[0];
    meta.streak = meta.lastDate === yStr ? meta.streak + 1 : 1;
    meta.lastDate = today;
  }
  saveMeta(meta);
  return wp;
}

function getDueWords() {
  const today = new Date().toISOString().split('T')[0];
  return WORDS.filter(w => {
    const wp = getWordProg(w.id);
    return wp.status !== 'new' && (wp.next === null || wp.next <= today);
  });
}

function getNewWords(limit=10) {
  return WORDS.filter(w => getWordProg(w.id).status === 'new').slice(0, limit);
}

let curScreen = 'home';
let wordFilter = 'all';
let fcSession = { words:[], idx:0, correct:0, wrong:0, flipped:false };
let qzSession = { words:[], idx:0, correct:0, answered:false };
let currentModalWord = null;

// ===================== TTS =====================
function speak(text, rate = 0.95) {
  if (!window.speechSynthesis) { showToast('裝置不支援語音功能'); return; }
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'ja-JP';
  u.rate = rate;
  u.pitch = 1.0;
  // pick Japanese voice if available
  const voices = speechSynthesis.getVoices();
  const jaVoice = voices.find(v => v.lang === 'ja-JP') || voices.find(v => v.lang.startsWith('ja'));
  if (jaVoice) u.voice = jaVoice;
  speechSynthesis.speak(u);
}
function speakFC() {
  const w = fcSession.words[fcSession.idx];
  if (w) speak(w.k);
}
function speakFCEx() {
  const w = fcSession.words[fcSession.idx];
  if (w && w.ex) speak(w.ex, 0.85);
  else showToast('此單字沒有例句');
}
function speakQZ() {
  const w = qzSession.words[qzSession.idx];
  if (w) speak(w.k);
}
function speakModal() {
  if (currentModalWord) speak(currentModalWord.k);
}
function speakModalEx() {
  if (currentModalWord && currentModalWord.ex) speak(currentModalWord.ex, 0.85);
  else showToast('此單字沒有例句');
}

// ===================== NAVIGATION =====================
function navigate(screen) {
  if (['flashcard','quiz'].includes(screen)) {
    if (screen === 'flashcard') startFlashcard('due');
    else startQuiz();
    return;
  }
  document.querySelectorAll('.screen').forEach(s => { s.style.display='none'; s.classList.remove('active'); });
  document.querySelectorAll('.bnav-btn').forEach(b => b.classList.remove('active'));
  const s = document.getElementById('s-'+screen);
  s.style.display = 'block';
  s.classList.add('active');
  document.getElementById('nav-'+screen)?.classList.add('active');
  curScreen = screen;
  document.getElementById('bottom-nav').style.display = 'flex';
  if (screen === 'home') updateHome();
  if (screen === 'words') renderWordList();
  if (screen === 'stats') renderStats();
}

function exitStudy() {
  navigate('home');
}

// ===================== HOME =====================
function updateHome() {
  const meta = loadMeta();
  const prog = loadProg();
  const today = new Date().toISOString().split('T')[0];
  const todayDate = new Date().toLocaleDateString('zh-TW',{year:'numeric',month:'long',day:'numeric',weekday:'short'});
  document.getElementById('today-date').textContent = todayDate;
  document.getElementById('streak-num').textContent = '🔥 '+meta.streak+'天連續';

  const due = getDueWords().length;
  const nw = getNewWords(10).length;
  let learned=0, total=0, rev=0, cor=0;
  WORDS.forEach(w => {
    total++;
    const wp = prog[w.id];
    if (wp) { if(wp.status==='learned') learned++; rev+=wp.reviews||0; cor+=wp.correct||0; }
  });
  document.getElementById('stat-due').textContent = due;
  document.getElementById('stat-new').textContent = nw;
  document.getElementById('stat-learned').textContent = learned;
  document.getElementById('stat-acc').textContent = rev>0 ? Math.round(cor/rev*100)+'%' : '—';
  const pct = Math.round(learned/total*100);
  document.getElementById('prog-bar').style.width = pct+'%';
  document.getElementById('prog-pct').textContent = pct+'%';
  document.getElementById('total-words').textContent = '/ '+total+' 單字';
}

// ===================== FLASHCARD =====================
function startFlashcard(mode) {
  let words;
  if (mode === 'due') {
    words = getDueWords();
    if (words.length === 0) {
      words = getNewWords(10);
      if (words.length === 0) { showToast('今天沒有需要複習的單字！'); return; }
    }
  } else {
    words = getNewWords(15);
    if (words.length === 0) { showToast('所有單字都已開始學習了！'); return; }
  }
  // shuffle
  words = words.sort(() => Math.random()-0.5).slice(0, 20);
  fcSession = { words, idx:0, correct:0, wrong:0, flipped:false };
  showFCScreen();
  loadFCCard();
}

function showFCScreen() {
  document.querySelectorAll('.screen').forEach(s => { s.style.display='none'; s.classList.remove('active'); });
  document.getElementById('bottom-nav').style.display = 'none';
  const sc = document.getElementById('s-flashcard');
  sc.style.display = 'flex';
  sc.classList.add('active');
  document.getElementById('fc-session-body').style.display = 'flex';
  document.getElementById('fc-done').style.display = 'none';
}

function loadFCCard() {
  if (fcSession.idx >= fcSession.words.length) { showFCDone(); return; }
  const w = fcSession.words[fcSession.idx];
  document.getElementById('fc-counter').textContent = (fcSession.idx+1)+'/'+fcSession.words.length;
  document.getElementById('fc-prog').style.width = (fcSession.idx/fcSession.words.length*100)+'%';
  document.getElementById('fc-pos-front').textContent = w.p;
  document.getElementById('fc-kanji').textContent = w.k;
  document.getElementById('fc-reading').textContent = w.r;
  document.getElementById('bc-kanji').textContent = w.k;
  document.getElementById('bc-reading').textContent = w.r;
  document.getElementById('bc-meaning').textContent = w.m;
  document.getElementById('bc-pos').textContent = w.p;
  const exEl = document.getElementById('bc-ex');
  if (w.ex) { exEl.innerHTML = '<b>例：</b>'+w.ex+'<br>'+w.exm; exEl.style.display='block'; }
  else { exEl.style.display='none'; }
  document.getElementById('fc-speak-ex').classList.toggle('hidden', !w.ex);
  document.getElementById('flip-inner').classList.remove('flipped');
  fcSession.flipped = false;
}

function flipCard() {
  const inner = document.getElementById('flip-inner');
  fcSession.flipped = !fcSession.flipped;
  if (fcSession.flipped) inner.classList.add('flipped');
  else inner.classList.remove('flipped');
}

function rateCard(q) {
  if (!fcSession.flipped) { flipCard(); return; }
  const w = fcSession.words[fcSession.idx];
  updateWordProg(w.id, q);
  if (q >= 2) fcSession.correct++; else fcSession.wrong++;
  fcSession.idx++;
  setTimeout(loadFCCard, 200);
}

function showFCDone() {
  document.getElementById('fc-session-body').style.display = 'none';
  document.getElementById('fc-done').style.display = 'flex';
  const total = fcSession.correct + fcSession.wrong;
  document.getElementById('fc-done-title').textContent = '本輪完成！🎉';
  document.getElementById('fc-done-sub').textContent =
    '答對 '+fcSession.correct+'/'+total+' 張（'+Math.round(fcSession.correct/total*100)+'%）';
}

// ===================== QUIZ =====================
function startQuiz() {
  const pool = WORDS.filter(w => getWordProg(w.id).status !== 'new');
  let words = pool.length >= 10 ? pool : WORDS;
  words = words.sort(() => Math.random()-0.5).slice(0, 10);
  qzSession = { words, idx:0, correct:0, answered:false };
  showQZScreen();
  loadQZQuestion();
}

function showQZScreen() {
  document.querySelectorAll('.screen').forEach(s => { s.style.display='none'; s.classList.remove('active'); });
  document.getElementById('bottom-nav').style.display = 'none';
  const sc = document.getElementById('s-quiz');
  sc.style.display = 'flex';
  sc.classList.add('active');
  document.getElementById('qz-body').style.display = 'block';
  document.getElementById('qz-score').style.display = 'none';
}

function loadQZQuestion() {
  if (qzSession.idx >= qzSession.words.length) { showQZScore(); return; }
  const w = qzSession.words[qzSession.idx];
  document.getElementById('qz-counter').textContent = (qzSession.idx+1)+'/'+qzSession.words.length;
  document.getElementById('qz-prog').style.width = (qzSession.idx/qzSession.words.length*100)+'%';
  document.getElementById('qz-word').textContent = w.k;
  document.getElementById('qz-reading').textContent = w.r;
  const posEl = document.getElementById('qz-pos');
  if (posEl) posEl.textContent = w.p;
  qzSession.answered = false;

  // build 4 choices
  const wrong = WORDS.filter(x => x.id !== w.id).sort(() => Math.random()-0.5).slice(0,3);
  const choices = [w, ...wrong].sort(() => Math.random()-0.5);
  const el = document.getElementById('qz-choices');
  el.innerHTML = '';
  const labels = ['A','B','C','D'];
  choices.forEach((c, i) => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.innerHTML = `<span class="choice-label">${labels[i]}</span><span>${c.m}</span>`;
    btn.onclick = () => answerQuiz(btn, c.id === w.id, w.id);
    el.appendChild(btn);
  });
}

function answerQuiz(btn, isCorrect, correctId) {
  if (qzSession.answered) return;
  qzSession.answered = true;
  const correctMeaning = WORDS.find(x => x.id === correctId)?.m;
  if (isCorrect) { btn.classList.add('correct'); qzSession.correct++; updateWordProg(correctId, 2); }
  else {
    btn.classList.add('wrong');
    document.querySelectorAll('.choice-btn').forEach(b => {
      const span = b.querySelectorAll('span')[1];
      if (span && span.textContent === correctMeaning) b.classList.add('correct');
    });
    updateWordProg(correctId, 0);
  }
  document.querySelectorAll('.choice-btn').forEach(b => b.classList.add('disabled'));
  setTimeout(() => { qzSession.idx++; loadQZQuestion(); }, 1200);
}

function showQZScore() {
  document.getElementById('qz-body').style.display = 'none';
  document.getElementById('qz-score').style.display = 'block';
  const total = qzSession.words.length;
  const pct = Math.round(qzSession.correct/total*100);
  document.getElementById('score-pct').textContent = pct+'%';
  document.getElementById('score-frac').textContent = qzSession.correct+'/'+total;
  const msgs = [[80,'太棒了！🌟','繼續保持，你是單字王！'],[60,'不錯喔！😊','再加把勁，很快就能掌握！'],[0,'繼續加油！💪','多複習幾次就會記住的！']];
  const [,title,sub] = msgs.find(([min]) => pct >= min);
  document.getElementById('score-msg').textContent = title;
  document.getElementById('score-sub').textContent = sub;
}

// ===================== WORD LIST =====================
function setFilter(el, filter) {
  document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  wordFilter = filter;
  renderWordList();
}

function renderWordList() {
  const q = (document.getElementById('search-input').value || '').toLowerCase();
  const prog = loadProg();
  let list = WORDS;
  if (q) list = list.filter(w => w.k.includes(q)||w.r.includes(q)||w.m.includes(q)||w.p.includes(q));
  if (['new','learning','learned'].includes(wordFilter)) {
    list = list.filter(w => (prog[w.id]?.status||'new') === wordFilter);
  } else if (['名詞','動詞','形容詞','な形容詞','副詞','接続詞'].includes(wordFilter)) {
    list = list.filter(w => w.p === wordFilter || (wordFilter==='形容詞' && (w.p==='形容詞'||w.p==='な形容詞')));
  }
  const el = document.getElementById('word-list');
  if (list.length === 0) { el.innerHTML = '<div style="text-align:center;color:var(--sub);padding:40px">找不到符合的單字</div>'; return; }
  el.innerHTML = list.map(w => {
    const wp = prog[w.id];
    const status = wp?.status || 'new';
    const dotClass = {new:'dot-new',learning:'dot-learning',learned:'dot-learned'}[status];
    return `<div class="word-item" onclick="showWordModal(${w.id})">
      <div class="word-status-dot ${dotClass}"></div>
      <div class="word-main">
        <div class="word-kanji">${w.k}</div>
        <div class="word-reading">${w.r}</div>
        <div class="word-meaning">${w.m}</div>
      </div>
      <div class="word-pos">${w.p}</div>
    </div>`;
  }).join('');
}

// ===================== WORD MODAL =====================
function showWordModal(id) {
  const w = WORDS.find(x => x.id === id);
  currentModalWord = w;
  const wp = getWordProg(id);
  document.getElementById('m-kanji').textContent = w.k;
  document.getElementById('m-reading').textContent = w.r;
  document.getElementById('m-meaning').textContent = w.m;
  const exBtn = document.getElementById('m-speak-ex-btn');
  if (exBtn) exBtn.style.opacity = w.ex ? '1' : '0.4';
  const posColors = {'名詞':'#4F46E5','動詞':'#059669','形容詞':'#D97706','な形容詞':'#7C3AED','副詞':'#0891B2','接続詞':'#DC2626','表現':'#6B7280'};
  const c = posColors[w.p]||'#6B7280';
  document.getElementById('m-pos').innerHTML = `<span style="background:${c}20;color:${c};padding:4px 12px;border-radius:99px;font-size:13px;font-weight:600">${w.p}</span>`;
  if (w.ex) {
    document.getElementById('m-ex').style.display='block';
    document.getElementById('m-ex-jp').textContent = w.ex;
    document.getElementById('m-ex-ch').textContent = w.exm;
  } else { document.getElementById('m-ex').style.display='none'; }
  const statusLabel = {new:'未學習',learning:'學習中',learned:'已掌握'}[wp.status];
  document.getElementById('m-status').textContent = statusLabel;
  document.getElementById('m-reviews').textContent = wp.reviews||0;
  const today = new Date().toISOString().split('T')[0];
  document.getElementById('m-interval').textContent = wp.next && wp.next > today ?
    wp.next.slice(5).replace('-','/') : (wp.next ? '今天' : '—');
  document.getElementById('modal-overlay').classList.add('open');
}

function closeModal(e) { if (e.target === document.getElementById('modal-overlay')) closeModalBtn(); }
function closeModalBtn() { document.getElementById('modal-overlay').classList.remove('open'); }

// ===================== STATS =====================
function renderStats() {
  const prog = loadProg();
  const meta = loadMeta();
  let nw=0, learning=0, learned=0;
  let rev=0, cor=0;
  WORDS.forEach(w => {
    const wp = prog[w.id];
    const s = wp?.status||'new';
    if(s==='new') nw++; else if(s==='learning') learning++; else learned++;
    rev += wp?.reviews||0; cor += wp?.correct||0;
  });
  const total = WORDS.length;
  const pct = Math.round(learned/total*100);
  document.getElementById('st-pct').textContent = pct+'%';
  document.getElementById('st-new').textContent = nw;
  document.getElementById('st-learning').textContent = learning;
  document.getElementById('st-learned').textContent = learned;
  document.getElementById('st-reviews').textContent = rev;
  document.getElementById('st-acc').textContent = rev>0 ? Math.round(cor/rev*100)+'%' : '—';
}

function confirmReset() {
  if (confirm('確定要重置所有學習進度嗎？此操作無法復原。')) {
    localStorage.removeItem(PROG_KEY);
    localStorage.removeItem(META_KEY);
    renderStats();
    showToast('進度已重置');
  }
}

// ===================== TOAST =====================
function showToast(msg, duration=2000) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), duration);
}

// ===================== INIT =====================
function init() {
  // register service worker
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(()=>{});
  }
  // update streak on load
  const meta = loadMeta();
  const today = new Date().toISOString().split('T')[0];
  if (meta.lastDate && meta.lastDate !== today) {
    const yesterday = new Date(); yesterday.setDate(yesterday.getDate()-1);
    if (meta.lastDate !== yesterday.toISOString().split('T')[0]) {
      meta.streak = 0; saveMeta(meta);
    }
  }
  navigate('home');
}

init();
</script>
